name: Update Preview PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: preview-pdf
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify preview editions
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install locked Node dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Run project tests
        run: |
          python3 -m unittest discover -s tests -v
          python3 check_project_rules.py

      - name: Install Chromium
        id: setupchrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable

      - name: Install CJK fonts and PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra poppler-utils

      - name: Install mdPress 0.7.10 with checksum verification
        env:
          MDPRESS_VERSION: "0.7.10"
          MDPRESS_SHA256: "17e53e455996940bbbce64c69c43b3fb543f1501e03b74cf0434074efebd2db4"
        run: |
          archive="$RUNNER_TEMP/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          extract_dir="$(mktemp -d)"
          curl -fsSL --retry 3 \
            "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" \
            -o "$archive"
          echo "${MDPRESS_SHA256}  $archive" | sha256sum -c -
          tar --extract --gzip --file "$archive" --directory "$extract_dir" mdpress
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 "$extract_dir/mdpress" "$RUNNER_TEMP/bin/mdpress"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install Pandoc 3.5 with checksum verification
        env:
          PANDOC_VERSION: "3.5"
          PANDOC_SHA256: "4f41d817d262ef3d17953a3e6e0fefddb971aa4f2f121544a9a86db449d945e1"
        run: |
          package="$RUNNER_TEMP/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          curl -fsSL --retry 3 \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" \
            -o "$package"
          echo "${PANDOC_SHA256}  $package" | sha256sum -c -
          sudo dpkg -i "$package"
          pandoc --version | head -1

      - name: Build latest preview PDF and HTML
        run: |
          mkdir -p dist "$RUNNER_TEMP/mmsvg"
          python3 tools/build_pdf.py \
            --output dist/oc_guide.pdf \
            --log-dir dist/build-logs \
            --attempts 2 \
            --timeout 600
          if ! timeout --signal=TERM 8m env PATH="$GITHUB_WORKSPACE/node_modules/.bin:$PATH" \
            python3 tools/render_mermaid.py --book-dir . --svg-out "$RUNNER_TEMP/mmsvg"; then
            echo "::error::Mermaid rendering failed — refusing to publish an edition with raw diagram source."
            exit 1
          fi
          title=$(python3 -c 'import json; print(json.load(open("book.json", encoding="utf-8"))["title"])')
          python3 tools/build_html_reader.py \
            --book-dir . \
            --title "$title" \
            --svg-dir "$RUNNER_TEMP/mmsvg" \
            --out dist/oc_guide.html

      - name: Upload PDF build logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oc-guide-preview-build-logs
          path: dist/build-logs/
          if-no-files-found: warn

      - name: Verify preview artifact identity and checksums
        run: |
          title=$(python3 -c 'import json; print(json.load(open("book.json", encoding="utf-8"))["title"])')
          python3 tools/verify_artifacts.py \
            --title "$title" \
            --pdf dist/oc_guide.pdf \
            --html dist/oc_guide.html \
            --checksums dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)

      - name: Transfer verified preview editions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oc-guide-preview-editions
          path: |
            dist/oc_guide.pdf
            dist/oc_guide.html
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish verified preview editions
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download verified preview editions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oc-guide-preview-editions
          path: dist

      - name: Recheck transferred artifact checksums
        run: (cd dist && sha256sum -c SHA256SUMS)

      - name: Write release notes
        run: |
          cat > dist/release-notes.md <<EOF
          Auto-updated preview editions from \`${GITHUB_SHA::7}\`.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          - Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          This mutable preview has checksums but no formal provenance. Use a tagged release for attested artifacts.
          EOF

      - name: Synchronize mutable preview tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid GITHUB_REPOSITORY: $GITHUB_REPOSITORY" >&2
            exit 1
          fi
          if [[ ! "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid GITHUB_SHA" >&2
            exit 1
          fi

          probe_dir=$(mktemp -d)
          trap 'rm -rf "$probe_dir"' EXIT
          set +e
          gh api --include --method GET \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/preview-pdf" \
            >"$probe_dir/response" 2>"$probe_dir/error"
          probe_rc=$?
          set -e
          http_status=$(awk '$1 ~ /^HTTP\// && $2 ~ /^[0-9][0-9][0-9]$/ { status=$2 } END { print status }' "$probe_dir/response")

          if [[ $probe_rc -eq 0 && "$http_status" == "200" ]]; then
            gh api --silent --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/preview-pdf" \
              --raw-field sha="$GITHUB_SHA" \
              --field force=true
          elif [[ $probe_rc -ne 0 && "$http_status" == "404" ]]; then
            gh api --silent --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              --raw-field ref="refs/tags/preview-pdf" \
              --raw-field sha="$GITHUB_SHA"
          else
            cat "$probe_dir/response" >&2
            cat "$probe_dir/error" >&2
            echo "Preview tag lookup failed (exit=$probe_rc, HTTP=${http_status:-unavailable}); refusing to mutate refs or releases." >&2
            exit 1
          fi

      - name: Create or update preview release
        shell: bash
        run: |
          set -euo pipefail
          error_file=$(mktemp)
          trap 'rm -f "$error_file"' EXIT
          set +e
          gh release view preview-pdf >/dev/null 2>"$error_file"
          release_rc=$?
          set -e

          if [[ $release_rc -eq 0 ]]; then
            gh release edit preview-pdf \
              --title "Latest Preview PDF" \
              --notes-file dist/release-notes.md \
              --prerelease
          elif [[ "$(tr -d '\r' < "$error_file")" == "release not found" ]]; then
            gh release create preview-pdf \
              --title "Latest Preview PDF" \
              --notes-file dist/release-notes.md \
              --prerelease \
              --latest=false \
              --verify-tag
          else
            cat "$error_file" >&2
            echo "Preview release lookup failed (exit=$release_rc); refusing to create or edit the release." >&2
            exit 1
          fi

      - name: Upload verified preview artifacts
        run: |
          gh release upload preview-pdf \
            dist/oc_guide.pdf \
            dist/oc_guide.html \
            dist/SHA256SUMS \
            --clobber
